name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            quick-hire/package-lock.json
            quick-hire-app/package-lock.json

      - name: Install backend dependencies
        working-directory: quick-hire
        run: npm ci

      - name: Build backend
        working-directory: quick-hire
        run: npm run build

      - name: Run backend tests
        working-directory: quick-hire
        run: npm test -- --runInBand

      - name: Install frontend dependencies
        working-directory: quick-hire-app
        run: npm ci

      - name: Build frontend
        working-directory: quick-hire-app
        env:
          NEXT_PUBLIC_API_URL: http://localhost:30081/api
        run: npm run build

  docker-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/quickhire-backend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Docker metadata (frontend)
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/quickhire-frontend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:30081/api
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
