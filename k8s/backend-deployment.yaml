apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickhire-backend
  namespace: quickhire
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickhire-backend
  template:
    metadata:
      labels:
        app: quickhire-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/quickhire-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: quickhire-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: quickhire-config
                  key: PORT
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: quickhire-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: quickhire-secret
                  key: JWT_REFRESH_SECRET
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: quickhire-secret
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: quickhire-secret
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: quickhire-config
                  key: MONGO_HOST
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: quickhire-config
                  key: MONGO_DB
            - name: MONGODB_URI
              value: mongodb://$(MONGO_USER):$(MONGO_PASS)@$(MONGO_HOST):27017/$(MONGO_DB)?authSource=admin